<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bobcats — trenérská analytika</title>
<link rel="icon" type="image/svg+xml" href="brand/playmetric-favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --red: #DC1F26;
  --red-soft: #FCEBEB;
  --red-dark: #501313;
  --black: #1A1A1A;
  --bg: #F8F8F7;
  --surface: #FFFFFF;
  --surface-alt: #F1EFE8;
  --text: #1A1A1A;
  --text-muted: #5F5E5A;
  --text-subtle: #888780;
  --border: rgba(26, 26, 26, 0.1);
  --radius: 12px;
  --radius-sm: 8px;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
.wrap { max-width: 980px; margin: 0 auto; padding: 16px; }

/* PlayMetric brand bar */
.pm-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  margin-bottom: 12px;
  background: #0F1B2D;
  border-radius: var(--radius);
  color: #FFFFFF;
}
.pm-bar a { display: inline-flex; align-items: center; gap: 10px; text-decoration: none; color: inherit; }
.pm-bar img { height: 22px; width: auto; display: block; }
.pm-bar .pm-tag {
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: rgba(255, 255, 255, 0.6);
  font-weight: 500;
}
@media (max-width: 540px) {
  .pm-bar .pm-tag { display: none; }
}

/* ── HERO ──────────────────────────────────────────────────────────────── */
.hero {
  background: var(--black);
  color: #fff;
  border-radius: var(--radius);
  padding: 22px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: relative;
  overflow: hidden;
  margin-bottom: 16px;
  flex-wrap: wrap;
  gap: 16px;
}
.hero::before { content: ""; position: absolute; left: 0; right: 0; bottom: 0; height: 5px; background: var(--red); }
.hero .brand { display: flex; align-items: center; gap: 16px; }
.hero .logo { width: 56px; height: 56px; flex-shrink: 0; }
.hero .logo img { width: 100%; height: 100%; object-fit: contain; filter: invert(1); }
.hero .wordmark { font-family: 'Bebas Neue', sans-serif; font-size: 38px; letter-spacing: 0.06em; line-height: 1; }
.hero .wordmark .accent { color: var(--red); }
.hero .meta-line { font-size: 11px; color: rgba(255, 255, 255, 0.65); margin-top: 4px; letter-spacing: 0.1em; text-transform: uppercase; }
.hero .right { display: flex; align-items: center; gap: 12px; }
.hero select {
  background: rgba(255, 255, 255, 0.08); color: #fff;
  border: 1px solid rgba(255, 255, 255, 0.2);
  padding: 8px 30px 8px 12px; border-radius: var(--radius-sm);
  font-family: inherit; font-size: 13px; font-weight: 500; cursor: pointer;
  appearance: none;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='white' d='M0 0l5 6 5-6z'/></svg>");
  background-repeat: no-repeat;
  background-position: right 10px center;
}

/* ── CONTROLS BAR (period + side tabs) ────────────────────────────────── */
.controls {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.tabs {
  display: inline-flex;
  background: var(--surface-alt);
  border-radius: 8px;
  padding: 3px;
}
.tab {
  border: 0; background: transparent;
  padding: 7px 18px;
  border-radius: 6px;
  font-family: inherit; font-size: 13px; font-weight: 500;
  letter-spacing: 0.04em; text-transform: uppercase;
  color: var(--text-muted); cursor: pointer;
  transition: all 0.15s ease;
}
.tab:hover { color: var(--text); }
.tab.active { background: var(--red); color: #fff; }
.scope { display: flex; align-items: center; gap: 8px; }
.scope label { font-size: 11px; color: var(--text-subtle); text-transform: uppercase; letter-spacing: 0.06em; }
.scope select {
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  padding: 7px 30px 7px 12px;
  border-radius: 6px;
  font-family: inherit; font-size: 13px; font-weight: 500; cursor: pointer;
  appearance: none;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='%231A1A1A' d='M0 0l5 6 5-6z'/></svg>");
  background-repeat: no-repeat;
  background-position: right 10px center;
}

/* ── METRIC CARDS ─────────────────────────────────────────────────────── */
.row { display: grid; gap: 12px; }
.metrics-3 { grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); margin-bottom: 16px; }
.metrics-4 { grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); margin-bottom: 16px; }
.metric {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  position: relative;
  overflow: hidden;
}
.metric.accent::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--red); }
.metric .lbl { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; }
.metric .val {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 30px; font-weight: 400;
  margin-top: 2px; font-variant-numeric: tabular-nums;
  line-height: 1.05; letter-spacing: 0.02em;
}
.metric .sub { font-size: 11px; color: var(--text-subtle); margin-top: 2px; }
.metric.split .vals {
  display: flex; gap: 14px; align-items: baseline; margin-top: 2px;
}
.metric.split .vals .num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px; line-height: 1;
  font-variant-numeric: tabular-nums;
}
.metric.split .vals .pct { color: var(--red); font-weight: 500; font-size: 14px; }

/* ── CARDS ────────────────────────────────────────────────────────────── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 20px;
  margin-top: 16px;
}
.card-title { display: flex; justify-content: space-between; align-items: baseline; margin: 0 0 14px; }
.card-title h3 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px; font-weight: 400;
  letter-spacing: 0.04em; margin: 0;
}
.card-title .meta { font-size: 11px; color: var(--text-subtle); text-transform: uppercase; letter-spacing: 0.06em; }

/* ── DRIVE RESULTS GRID ──────────────────────────────────────────────── */
.drv-results { display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 8px; }
.drv-result {
  background: var(--surface-alt);
  padding: 12px 8px;
  border-radius: var(--radius-sm);
  text-align: center;
}
.drv-result.td { background: var(--red-soft); }
.drv-result.td .v { color: var(--red); }
.drv-result .v {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 26px; font-weight: 400;
  font-variant-numeric: tabular-nums; line-height: 1;
}
.drv-result .l {
  font-size: 10px; color: var(--text-subtle);
  text-transform: uppercase; letter-spacing: 0.06em; margin-top: 4px;
}

/* ── FIELD ────────────────────────────────────────────────────────────── */
.field {
  position: relative; height: 70px;
  background: var(--surface-alt); border-radius: var(--radius-sm);
  margin-top: 16px; overflow: hidden;
}
.field .midline { position: absolute; left: 50%; top: 0; bottom: 0; width: 1px; background: rgba(0,0,0,0.15); }
.field .endzone-l, .field .endzone-r { position: absolute; top: 0; bottom: 0; width: 10%; background: rgba(220, 31, 38, 0.12); }
.field .endzone-l { left: 0; }
.field .endzone-r { right: 0; }
.field .dot {
  position: absolute; top: 50%; transform: translate(-50%, -50%);
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--red); opacity: 0.55;
}
.field-cap {
  display: flex; justify-content: space-between;
  font-size: 10px; color: var(--text-subtle);
  margin-top: 6px; text-transform: uppercase; letter-spacing: 0.06em;
}

/* ── BAR ROWS (fauly + playbook akce) ─────────────────────────────────── */
.bar-row {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 12px;
  align-items: center;
  padding: 6px 0;
  font-size: 13px;
}
.bar-row .label { color: var(--text); }
.bar-row .label .side {
  font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em;
  margin-left: 6px; padding: 1px 5px; border-radius: 3px;
}
.bar-row .label .side.off { background: var(--red-soft); color: var(--red-dark); }
.bar-row .label .side.def { background: var(--surface-alt); color: var(--text-muted); }
.bar-row .label .side.both { background: #E6F1FB; color: #042C53; }
.bar-vis { display: flex; align-items: center; gap: 8px; width: 180px; max-width: 50vw; }
.bar-wrap { flex: 1; height: 16px; background: var(--surface-alt); border-radius: 4px; overflow: hidden; }
.bar { height: 100%; border-radius: 4px; background: var(--red); }
.bar.def { background: var(--black); }
.bar.both { background: #185FA5; }
.bar-val {
  font-variant-numeric: tabular-nums;
  font-weight: 500;
  min-width: 30px;
  text-align: right;
  color: var(--text-muted);
}

/* ── TABLE ────────────────────────────────────────────────────────────── */
.lb table { width: 100%; font-size: 12px; border-collapse: collapse; }
.lb th {
  text-align: left; font-weight: 500;
  color: var(--text-subtle);
  padding: 8px 6px;
  border-bottom: 1px solid var(--border);
  font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em;
}
.lb td { padding: 10px 6px; border-bottom: 1px solid var(--border); }
.lb tr:last-child td { border-bottom: none; }
.lb .num { text-align: right; font-variant-numeric: tabular-nums; }
.lb .opp { font-weight: 500; }
.lb .opp .date { color: var(--text-subtle); font-weight: 400; }
.lb .badge {
  font-size: 10px; padding: 2px 8px; border-radius: 4px;
  font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em;
}
.lb .badge.w { background: var(--red); color: #fff; }
.lb .badge.l { background: var(--surface-alt); color: var(--text-muted); }
.lb .badge.t { background: var(--surface-alt); color: var(--text-muted); }

.empty, .loading { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 14px; }
.empty .ico, .loading .ico { font-size: 32px; opacity: 0.4; margin-bottom: 8px; display: block; }
.spinner {
  width: 28px; height: 28px;
  border: 2px solid var(--border);
  border-top-color: var(--red);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.chart-wrap { position: relative; width: 100%; height: 220px; }

.legend-inline {
  display: flex; gap: 16px;
  font-size: 11px; color: var(--text-muted);
  margin-bottom: 10px;
  text-transform: uppercase; letter-spacing: 0.06em;
}
.legend-inline .swatch {
  display: inline-block;
  width: 10px; height: 10px;
  border-radius: 2px;
  margin-right: 5px;
  vertical-align: -1px;
}

.coming-soon {
  font-size: 12px;
  color: var(--text-subtle);
  font-style: italic;
  padding: 16px;
  background: var(--surface-alt);
  border-radius: var(--radius-sm);
  text-align: center;
}

.footer {
  text-align: center; margin-top: 24px; padding: 16px 0;
  font-size: 11px; color: var(--text-subtle);
  letter-spacing: 0.05em; text-transform: uppercase;
}

@media (max-width: 480px) {
  .hero { padding: 18px 20px; flex-direction: column; align-items: flex-start; }
  .hero .wordmark { font-size: 32px; }
  .hero .logo { width: 48px; height: 48px; }
  .controls { flex-direction: column; align-items: stretch; gap: 8px; }
  .scope { justify-content: space-between; }
  .metric .val { font-size: 26px; }
  .card { padding: 14px 16px; }
  .lb th, .lb td { padding: 6px 4px; font-size: 11px; }
  .lb th:nth-child(5), .lb td:nth-child(5),
  .lb th:nth-child(6), .lb td:nth-child(6) { display: none; }
  .bar-vis { width: 120px; }
}
</style>
</head>
<body>
<div class="wrap">

  <div class="pm-bar">
    <a href="#" aria-label="PlayMetric"><img src="brand/playmetric-logo-horizontal-white.svg" alt="PlayMetric"></a>
    <span class="pm-tag">Measure every play</span>
  </div>

  <header class="hero">
    <div class="brand">
      <div class="logo"><img src="bobcats-logo.png" alt="Bobcats logo"></div>
      <div>
        <div class="wordmark"><span class="accent">BOB</span>CATS</div>
        <div class="meta-line" id="hero-sub">Trenérská analytika · Sezóna 2026</div>
      </div>
    </div>
    <div class="right">
      <select id="team-picker" aria-label="Vyber tým"></select>
    </div>
  </header>

  <div id="content">
    <div class="loading"><div class="spinner"></div>Načítám data…</div>
  </div>

  <footer class="footer">Bobcats stats · trenérská sekce · powered by <strong>PlayMetric</strong></footer>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxq-2I7KqIaE-S7mriXsJ-9s5OjCzFcmpVEMVVG4kGtuns5STvRDjAQi9HdRWyeOvkX/exec';

function jsonp(params) {
  return new Promise((resolve, reject) => {
    const cbName = 'cb_' + Date.now() + '_' + Math.floor(Math.random()*10000);
    const sc = document.createElement('script');
    const tm = setTimeout(() => { cleanup(); reject(new Error('Timeout')); }, 15000);
    function cleanup() { clearTimeout(tm); delete window[cbName]; if (sc.parentNode) sc.parentNode.removeChild(sc); }
    window[cbName] = (data) => { cleanup(); resolve(data); };
    sc.onerror = () => { cleanup(); reject(new Error('Script error')); };
    const qs = Object.entries({ ...params, callback: cbName })
      .map(([k, v]) => `${encodeURIComponent(k)}=${encodeURIComponent(v)}`)
      .join('&');
    sc.src = `${GAS_URL}?${qs}`;
    document.head.appendChild(sc);
  });
}

function escapeHTML(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
    '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
  }[c]));
}
function escapeAttr(s) { return escapeHTML(s); }
function pct(num, den) { return den > 0 ? Math.round(num/den*100) : 0; }
function emptyState(msg) {
  return `<div class="card"><div class="empty"><span class="ico">📊</span>${escapeHTML(msg)}</div></div>`;
}

// ============================================================
//  STATE
// ============================================================
let DATA = null;          // celá payload z getCoachStats
let CURRENT_TEAM = '';
let SIDE = 'off';         // 'off' | 'def'
let SCOPE = 'all';        // 'all' | match.idx (string)

// ============================================================
//  AGGREGATE PRO VYBRANÝ SCOPE
//  Vrací stats objekt pro right side panel.
// ============================================================
function aggregateForScope() {
  if (!DATA) return null;
  if (SCOPE === 'all') return DATA.totals;

  const m = DATA.matchLog.find(x => String(x.idx) === String(SCOPE));
  if (!m) return DATA.totals;

  // Single-match struktura kompatibilní s totals (vč. Phase 2)
  return {
    matches: 1,
    off: {
      points: m.ourScore,
      pointsAvg: m.ourScore,
      rushYds: m.rushYds, passYds: m.passYds, totalYds: m.totalYds,
      drives: m.offDrives, td: m.offTD,
      driveEffPct: m.tdPct,
      qbAtt: m.qbAtt, qbComp: m.qbComp, qbYds: m.qbYds, qbTD: m.qbTD, qbINT: m.qbINT,
      passPct: m.passPct,
      xp1Att: m.xp1Att, xp1Ok: m.xp1Ok, xp1Pct: m.xp1Pct,
      xp2Att: m.xp2Att, xp2Ok: m.xp2Ok, xp2Pct: m.xp2Pct,
    },
    def: {
      pointsAgainst: m.oppScore,
      pointsAvg: m.oppScore,
      drives: m.defDrives,
      stops: m.defStops,
      stopPct: m.stopPct,
      rushYds: m.oppRushYds || 0,
      passYds: m.oppPassYds || 0,
      totalYds: m.oppTotalYds || 0,
    },
    fauly: { count: m.penCount, yds: m.penYds },
    downDist: m.downDist || { 1:0, 2:0, 3:0, 4:0 },
    playbookAkce: m.playbookAkce || []
  };
}

// ============================================================
//  RENDER — OFF panel
// ============================================================
function renderOff(s) {
  const o = s.off;
  const scopeLabel = SCOPE === 'all' ? 'celá sezóna' : `1 zápas`;
  return `
    <div class="row metrics-4">
      <div class="metric accent">
        <div class="lbl">Body skórované</div>
        <div class="val">${o.points}</div>
        <div class="sub">${SCOPE === 'all' ? o.pointsAvg + ' / zápas' : 'v zápase'}</div>
      </div>
      <div class="metric">
        <div class="lbl">Rush yardů</div>
        <div class="val">${o.rushYds}</div>
        <div class="sub">naběhané</div>
      </div>
      <div class="metric">
        <div class="lbl">Pass yardů</div>
        <div class="val">${o.passYds}</div>
        <div class="sub">přihrávkou</div>
      </div>
      <div class="metric accent">
        <div class="lbl">Celkem yardů</div>
        <div class="val">${o.totalYds}</div>
        <div class="sub">${scopeLabel}</div>
      </div>
    </div>

    <div class="row metrics-3">
      <div class="metric split">
        <div class="lbl">Drive úspěšnost</div>
        <div class="vals">
          <span class="num">${o.td}</span>
          <span style="color:var(--text-subtle);font-size:13px">/ ${o.drives}</span>
          <span class="pct">${o.driveEffPct}%</span>
        </div>
        <div class="sub">drives → TD</div>
      </div>
      <div class="metric split">
        <div class="lbl">Pass úspěšnost</div>
        <div class="vals">
          <span class="num">${o.qbComp}</span>
          <span style="color:var(--text-subtle);font-size:13px">/ ${o.qbAtt}</span>
          <span class="pct">${o.passPct}%</span>
        </div>
        <div class="sub">QB COMP / ATT</div>
      </div>
      <div class="metric">
        <div class="lbl">Celkem TD</div>
        <div class="val">${o.td}</div>
        <div class="sub">touchdownů</div>
      </div>
    </div>

    <div class="row metrics-3">
      <div class="metric split">
        <div class="lbl">1PT konverze</div>
        <div class="vals">
          <span class="num">${o.xp1Ok}</span>
          <span style="color:var(--text-subtle);font-size:13px">/ ${o.xp1Att}</span>
          <span class="pct">${o.xp1Pct}%</span>
        </div>
        <div class="sub">úspěšné / pokusy</div>
      </div>
      <div class="metric split">
        <div class="lbl">2PT konverze</div>
        <div class="vals">
          <span class="num">${o.xp2Ok}</span>
          <span style="color:var(--text-subtle);font-size:13px">/ ${o.xp2Att}</span>
          <span class="pct">${o.xp2Pct}%</span>
        </div>
        <div class="sub">úspěšné / pokusy</div>
      </div>
      <div class="metric">
        <div class="lbl">QB INT</div>
        <div class="val">${o.qbINT}</div>
        <div class="sub">interceptions</div>
      </div>
    </div>

    ${renderDownDist(s.downDist)}
    ${renderPlaybook(s.playbookAkce)}
  `;
}

function renderDownDist(dd) {
  if (!dd) return '';
  const total = (dd[1]||0) + (dd[2]||0) + (dd[3]||0) + (dd[4]||0);
  if (total === 0) {
    return `
      <div class="card">
        <div class="card-title"><h3>Down distribuce</h3><span class="meta">útočné plays</span></div>
        <div class="empty">Zatím žádná per-play data v této sezóně. Po novém uložení zápasu se začnou plnit.</div>
      </div>`;
  }
  // Bar chart per down (1st, 2nd, 3rd, 4th)
  const max = Math.max(1, dd[1]||0, dd[2]||0, dd[3]||0, dd[4]||0);
  const rows = [1, 2, 3, 4].map(d => {
    const c = dd[d] || 0;
    const pct = total ? Math.round(c/total*100) : 0;
    return `
      <div class="bar-row">
        <span class="label">${d}. down <span style="color:var(--text-subtle);font-weight:400;margin-left:4px">${pct}%</span></span>
        <span class="bar-vis">
          <span class="bar-wrap"><span class="bar" style="width:${(c/max*100).toFixed(0)}%"></span></span>
          <span class="bar-val">${c}</span>
        </span>
      </div>`;
  }).join('');
  return `
    <div class="card">
      <div class="card-title"><h3>Down distribuce</h3><span class="meta">${total} útočných plays</span></div>
      ${rows}
    </div>`;
}

function renderPlaybook(akce) {
  if (!akce || akce.length === 0) {
    return `
      <div class="card">
        <div class="card-title"><h3>Playbook akce</h3><span class="meta">úspěšnost per akce</span></div>
        <div class="empty">Zatím žádné pojmenované akce z playbooku.<br>
          <small style="color:var(--text-subtle)">V aplikaci pojmenuj akce v poli "Název hry" — pak se tu agregují.</small>
        </div>
      </div>`;
  }
  const max = Math.max(1, ...akce.map(a => a.count));
  const rows = akce.map(a => `
    <div class="bar-row">
      <span class="label">${escapeHTML(a.name)}
        <span style="color:var(--text-subtle);font-weight:400;margin-left:6px">${a.totalYds} yd · avg ${a.avgYds}${a.td ? ' · ' + a.td + ' TD' : ''}</span>
      </span>
      <span class="bar-vis">
        <span class="bar-wrap"><span class="bar" style="width:${(a.count/max*100).toFixed(0)}%"></span></span>
        <span class="bar-val">${a.count}×</span>
      </span>
    </div>`).join('');
  return `
    <div class="card">
      <div class="card-title"><h3>Playbook akce</h3><span class="meta">${akce.length} různých akcí</span></div>
      ${rows}
    </div>`;
}

// ============================================================
//  RENDER — DEF panel
// ============================================================
function renderDef(s) {
  const d = s.def;
  const scopeLabel = SCOPE === 'all' ? 'celá sezóna' : 'v zápase';
  const oppRush = d.rushYds || 0, oppPass = d.passYds || 0, oppTotal = d.totalYds || 0;
  return `
    <div class="row metrics-4">
      <div class="metric accent">
        <div class="lbl">Body obdržené</div>
        <div class="val">${d.pointsAgainst}</div>
        <div class="sub">${SCOPE === 'all' ? d.pointsAvg + ' / zápas' : scopeLabel}</div>
      </div>
      <div class="metric">
        <div class="lbl">Rush yardů soupeře</div>
        <div class="val">${oppRush}</div>
        <div class="sub">naběhal proti nám</div>
      </div>
      <div class="metric">
        <div class="lbl">Pass yardů soupeře</div>
        <div class="val">${oppPass}</div>
        <div class="sub">napasoval proti nám</div>
      </div>
      <div class="metric accent">
        <div class="lbl">Celkem yardů soupeře</div>
        <div class="val">${oppTotal}</div>
        <div class="sub">${scopeLabel}</div>
      </div>
    </div>

    <div class="row metrics-3">
      <div class="metric split">
        <div class="lbl">Drive úspěšnost</div>
        <div class="vals">
          <span class="num">${d.stops}</span>
          <span style="color:var(--text-subtle);font-size:13px">/ ${d.drives}</span>
          <span class="pct">${d.stopPct}%</span>
        </div>
        <div class="sub">stops / drives soupeře</div>
      </div>
      <div class="metric">
        <div class="lbl">Drive počet</div>
        <div class="val">${d.drives}</div>
        <div class="sub">drives soupeře</div>
      </div>
      <div class="metric">
        <div class="lbl">Stops</div>
        <div class="val">${d.stops}</div>
        <div class="sub">ubráněných drivů</div>
      </div>
    </div>

    <div class="row metrics-3">
      <div class="metric">
        <div class="lbl">Body proti / drive</div>
        <div class="val">${d.drives ? Math.round(d.pointsAgainst/d.drives*10)/10 : 0}</div>
        <div class="sub">průměr</div>
      </div>
      <div class="metric">
        <div class="lbl">Yardů soupeře / drive</div>
        <div class="val">${d.drives ? Math.round(oppTotal/d.drives*10)/10 : 0}</div>
        <div class="sub">průměr</div>
      </div>
      <div class="metric">
        <div class="lbl">Soupeřova konverze</div>
        <div class="val">—</div>
        <div class="sub">vyžaduje opp XP wizard</div>
      </div>
    </div>

    ${oppTotal === 0 && d.drives > 0 ? `
      <div class="card">
        <div class="coming-soon">
          ℹ Soupeřovy yardy se počítají z plays kde byl soupeř na útoku. Pokud vidíš 0, tak appka ještě tyto play data neukládá — uložte další zápas po Phase 2 update.
        </div>
      </div>` : ''}
  `;
}

// ============================================================
//  RENDER — společné sekce (drives, fauly, match log)
// ============================================================
function renderCommon() {
  const dr = DATA.driveResults;
  const total = DATA.driveCount;

  // Drive results — celosezónní (nezávisí na SCOPE, je to jen referenční)
  const drvHTML = total === 0 ? '' : `
    <div class="card">
      <div class="card-title"><h3>Útočné drives — souhrn</h3><span class="meta">celá sezóna · ${total} drives</span></div>
      <div class="drv-results">
        <div class="drv-result td"><div class="v">${dr.td || 0}</div><div class="l">TD</div></div>
        <div class="drv-result"><div class="v">${dr.downs || 0}</div><div class="l">Downs</div></div>
        <div class="drv-result"><div class="v">${dr.int || 0}</div><div class="l">INT</div></div>
        <div class="drv-result"><div class="v">${dr.safety || 0}</div><div class="l">Safety</div></div>
        <div class="drv-result"><div class="v">${(dr.halftime||0)+(dr.eog||0)+(dr.turnover||0)+(dr.other||0)}</div><div class="l">Ostatní</div></div>
      </div>
      <div class="field" aria-hidden="true">
        <div class="endzone-l"></div><div class="endzone-r"></div><div class="midline"></div>
        ${DATA.endPositions.map(b => `<div class="dot" style="left:${(b/50*100).toFixed(1)}%"></div>`).join('')}
      </div>
      <div class="field-cap"><span>Vlastní endzone</span><span>Středová čára</span><span>Soupeřova endzone</span></div>
    </div>`;

  // Fauly breakdown
  const faulMax = Math.max(1, ...DATA.faulyBreakdown.map(f => f.count));
  const faulRows = DATA.faulyBreakdown.map(f => {
    const sideClass = f.side === 'Útok' ? 'off' : f.side === 'Obrana' ? 'def' : 'both';
    return `
      <div class="bar-row">
        <span class="label">${escapeHTML(f.name)}<span class="side ${sideClass}">${escapeHTML(f.side || '—')}</span></span>
        <span class="bar-vis">
          <span class="bar-wrap"><span class="bar ${sideClass}" style="width:${(f.count/faulMax*100).toFixed(0)}%"></span></span>
          <span class="bar-val">${f.count}</span>
        </span>
      </div>`;
  }).join('');

  const faulHTML = `
    <div class="card">
      <div class="card-title"><h3>Fauly podle typu</h3><span class="meta">strana faulu</span></div>
      ${DATA.faulyBreakdown.length === 0 ? '<div class="empty">Žádné fauly v sezóně.</div>' : `
        <div class="legend-inline">
          <span><span class="swatch" style="background:var(--red)"></span>Útok</span>
          <span><span class="swatch" style="background:var(--black)"></span>Obrana</span>
          <span><span class="swatch" style="background:#185FA5"></span>Oba</span>
        </div>
        ${faulRows}`}
    </div>`;

  // Match log
  const matchRows = DATA.matchLog.slice().reverse().map(m => `
    <tr>
      <td class="opp">${escapeHTML(m.opponent)}<span class="date"> · ${escapeHTML(m.date)}</span></td>
      <td class="num">${m.ourScore}–${m.oppScore}</td>
      <td class="num">${m.offDrives}</td>
      <td class="num">${m.tdPct}%</td>
      <td class="num">${m.passYds}</td>
      <td class="num">${m.rushYds}</td>
      <td class="num">${m.penCount} (${m.penYds}y)</td>
      <td><span class="badge ${m.result === 'W' ? 'w' : m.result === 'L' ? 'l' : 't'}">${m.result}</span></td>
    </tr>
  `).join('');

  const logHTML = DATA.matchLog.length === 0 ? '' : `
    <div class="card lb">
      <div class="card-title"><h3>Match log</h3><span class="meta">${DATA.matchCount} zápasů</span></div>
      <table>
        <thead><tr><th>Zápas</th><th class="num">Skóre</th><th class="num">Drives</th><th class="num">TD %</th><th class="num">Pass Y</th><th class="num">Rush Y</th><th class="num">Fauly</th><th></th></tr></thead>
        <tbody>${matchRows}</tbody>
      </table>
    </div>`;

  return drvHTML + faulHTML + logHTML;
}

// ============================================================
//  RENDER ROOT
// ============================================================
function renderAll() {
  const stats = aggregateForScope();
  if (!stats) {
    document.getElementById('content').innerHTML = emptyState('Pro tento tým zatím nejsou žádná data.');
    return;
  }

  // Controls bar (period picker + tabs)
  const matchOptions = DATA.matchLog.map(m =>
    `<option value="${m.idx}"${String(m.idx) === SCOPE ? ' selected' : ''}>${escapeHTML(m.opponent)} · ${escapeHTML(m.date)}</option>`
  ).join('');

  const controlsHTML = `
    <div class="controls">
      <div class="tabs" role="tablist">
        <button class="tab ${SIDE === 'off' ? 'active' : ''}" data-side="off">Útok</button>
        <button class="tab ${SIDE === 'def' ? 'active' : ''}" data-side="def">Obrana</button>
      </div>
      <div class="scope">
        <label for="scope-select">Rozsah</label>
        <select id="scope-select">
          <option value="all"${SCOPE === 'all' ? ' selected' : ''}>Celá sezóna</option>
          ${matchOptions}
        </select>
      </div>
    </div>`;

  const sideHTML = SIDE === 'off' ? renderOff(stats) : renderDef(stats);

  document.getElementById('content').innerHTML = controlsHTML + sideHTML + renderCommon();

  // Event handlery
  document.querySelectorAll('.tab').forEach(btn => {
    btn.addEventListener('click', () => { SIDE = btn.dataset.side; renderAll(); });
  });
  document.getElementById('scope-select').addEventListener('change', e => {
    SCOPE = e.target.value;
    renderAll();
  });

  document.getElementById('hero-sub').textContent = `Trenérská analytika · ${CURRENT_TEAM}`;
}

// ============================================================
//  Init
// ============================================================
async function loadTeams() {
  try {
    const res = await jsonp({ action: 'getTeams' });
    return (res && res.teams) || [];
  } catch (e) {
    console.error('getTeams failed:', e);
    return [];
  }
}

async function loadAndRender(team) {
  CURRENT_TEAM = team;
  document.getElementById('content').innerHTML = `<div class="loading"><div class="spinner"></div>Načítám data…</div>`;
  try {
    DATA = await jsonp({ action: 'coachStats', team });
    renderAll();
  } catch (e) {
    console.error('coachStats failed:', e);
    document.getElementById('content').innerHTML = `
      <div class="card"><div class="empty"><span class="ico">⚠</span>
        Nepodařilo se načíst data.<br>
        <small style="color:var(--text-subtle)">${escapeHTML(e.message)}</small>
      </div></div>`;
  }
}

(async () => {
  const teams = await loadTeams();
  const picker = document.getElementById('team-picker');
  if (teams.length === 0) {
    picker.style.display = 'none';
    document.getElementById('content').innerHTML = emptyState('Zatím žádné týmy v databázi.');
    return;
  }
  picker.innerHTML = teams.map(t => `<option value="${escapeAttr(t)}">${escapeHTML(t)}</option>`).join('');
  const fromUrl = new URLSearchParams(window.location.search).get('team');
  const initial = fromUrl && teams.includes(fromUrl) ? fromUrl : teams[0];
  picker.value = initial;
  if (teams.length === 1) picker.style.display = 'none';
  picker.addEventListener('change', () => {
    SIDE = 'off'; SCOPE = 'all';
    loadAndRender(picker.value);
    const u = new URL(window.location.href);
    u.searchParams.set('team', picker.value);
    history.replaceState(null, '', u.toString());
  });
  loadAndRender(initial);
})();
</script>
