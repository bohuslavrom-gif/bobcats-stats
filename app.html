function getTeamStats(teamKey) {
  const team = state.teams[teamKey];
  const teamName = team.name;
  const oppKey = teamKey === 'A' ? 'B' : 'A';
  const oppName = state.teams[oppKey].name;

  const OFF_BADGES = ['run','run_td','pass','pass_td','sack'];
  const offPlays = state.playLog.filter(p => p.teamName === teamName && OFF_BADGES.includes(p.badge));
  const defPlays = state.playLog.filter(p => p.teamName !== teamName && p.teamName !== '' && OFF_BADGES.includes(p.badge));

  // Yardage
  let passYds = 0, rushYds = 0;
  offPlays.forEach(p => {
    if (['pass','pass_td'].includes(p.badge)) {
      const m = p.desc.match(/\+(\d+) yd/);
      if (m) passYds += parseInt(m[1]);
    }
    if (['run','run_td'].includes(p.badge)) {
      const m = p.desc.match(/([+-]?\d+) yd/);
      if (m) rushYds += parseInt(m[1]);
    }
  });

  // Def yardage allowed
  let defPassYds = 0, defRushYds = 0;
  defPlays.forEach(p => {
    if (['pass','pass_td'].includes(p.badge)) { const m = p.desc.match(/\+(\d+) yd/); if(m) defPassYds += parseInt(m[1]); }
    if (['run','run_td'].includes(p.badge))   { const m = p.desc.match(/([+-]?\d+) yd/); if(m) defRushYds += parseInt(m[1]); }
  });

  // Hry counts
  const offCount = offPlays.length;
  const defCount = defPlays.length;
  const offAvg = offCount > 0 ? ((passYds + rushYds) / offCount).toFixed(1) : '0.0';
  const defAvg = defCount > 0 ? ((defPassYds + defRushYds) / defCount).toFixed(1) : '0.0';

  // Drives — OFF drives = this team's drives, DEF drives = opponent's drives
  const offDrives = state.drives.filter(d => d.team === teamKey);
  const defDrives = state.drives.filter(d => d.team === oppKey);
  const offTDs = offDrives.filter(d => d.result === 'td').length;
  const defTDs = defDrives.filter(d => d.result === 'td').length; // opponent TDs = def failures
  const defStopped = defDrives.filter(d => d.result !== 'td').length; // def success = stopped drives

  // XP — OFF: how many we scored, DEF: how many we stopped
  const offXP1drives = state.drives.filter(d => d.team === teamKey && d.xpAttempted === 1);
  const offXP2drives = state.drives.filter(d => d.team === teamKey && d.xpAttempted === 2);
  const defXP1drives = state.drives.filter(d => d.team === oppKey && d.xpAttempted === 1);
  const defXP2drives = state.drives.filter(d => d.team === oppKey && d.xpAttempted === 2);

  // Penalties
  const penPlays = state.playLog.filter(p => p.teamName === teamName && p.badge === 'penalty');
  let penYds = 0;
  penPlays.forEach(p => { const m = p.desc.match(/([+-]?\d+) yd/); if(m) penYds += Math.abs(parseInt(m[1])); });

  return {
    team, teamName, oppName,
    passYds, rushYds, totalYds: passYds + rushYds,
    defPassYds, defRushYds, defTotalYds: defPassYds + defRushYds,
    offCount, defCount, offAvg, defAvg,
    offDrives, defDrives, offTDs, defTDs, defStopped,
    offXP1drives, offXP2drives, defXP1drives, defXP2drives,
    penPlays: penPlays.length, penYds
  };
}

function statCard(title, content) {
  return `<div class="stat-card"><div class="stat-card-title">${title}</div>${content}</div>`;
}

function heroRow(items) {
  return `<div class="stat-hero-row">${items.map(([val, lbl, cls]) =>
    `<div class="stat-hero-item"><div class="stat-hero-val${cls?' '+cls:''}">${val}</div><div class="stat-hero-label">${lbl}</div></div>`
  ).join('')}</div>`;
}

function twoColRow(label, offVal, defVal, offLbl='OFF', defLbl='DEF') {
  return `<div class="two-col-row">
    <div class="two-col-label">${label}</div>
    <div class="two-col-vals">
      <div class="two-col-val"><div class="tcv-num">${offVal}</div><div class="tcv-lbl">${offLbl}</div></div>
      <div class="two-col-val"><div class="tcv-num">${defVal}</div><div class="tcv-lbl">${defLbl}</div></div>
    </div>
  </div>`;
}

function renderStatsPage() {
  const st = getTeamStats(statsTeam);
  document.getElementById('stats-header-title').textContent = st.teamName;
  let html = '';

  if (statsSection === 'tymy') {
    // YARDY
    html += statCard('Yardy', `
      ${heroRow([
        [st.totalYds, 'Celkem', 'green'],
        [st.passYds, 'Passing', ''],
        [st.rushYds, 'Rushing', '']
      ])}
      <div class="stat-divider">Dovoleno soupeři</div>
      ${heroRow([
        [st.defTotalYds, 'Celkem', 'red'],
        [st.defPassYds, 'Pass', ''],
        [st.defRushYds, 'Rush', '']
      ])}
    `);

    // HRY
    html += statCard('Hry', `
      <div class="two-col-header"><span></span><span class="tch">OFF</span><span class="tch">DEF</span></div>
      ${twoColRow('Počet hrají', st.offCount, st.defCount)}
      ${twoColRow('Celkem yardů', st.passYds + st.rushYds, st.defTotalYds)}
      ${twoColRow('Průměr / hra', st.offAvg + ' yd', st.defAvg + ' yd')}
    `);

    // DRIVE
    html += statCard('Drive', `
      <div class="two-col-header"><span></span><span class="tch">OFF</span><span class="tch">DEF</span></div>
      ${twoColRow('Celkem drivů', st.offDrives.length, st.defDrives.length)}
      ${twoColRow('Úspěšné (TD)', st.offTDs, st.defStopped, 'Skórováno', 'Ubráněno')}
    `);

    // XP ÚSPĚŠNOST
    html += statCard('Úspěšnost potvrzení', `
      <div class="two-col-header"><span></span><span class="tch">OFF</span><span class="tch">DEF</span></div>
      ${twoColRow('1PT pokusy',
        st.offXP1drives.length > 0 ? `${st.offXP1drives.filter(d=>d.xpScored===1).length}/${st.offXP1drives.length}` : '—',
        st.defXP1drives.length > 0 ? `${st.defXP1drives.filter(d=>d.xpScored===0).length}/${st.defXP1drives.length}` : '—',
        'Dáno', 'Ubráněno'
      )}
      ${twoColRow('2PT pokusy',
        st.offXP2drives.length > 0 ? `${st.offXP2drives.filter(d=>d.xpScored===2).length}/${st.offXP2drives.length}` : '—',
        st.defXP2drives.length > 0 ? `${st.defXP2drives.filter(d=>d.xpScored===0).length}/${st.defXP2drives.length}` : '—',
        'Dáno', 'Ubráněno'
      )}
    `);

    // FAULY
    html += statCard('Fauly', `
      ${heroRow([
        [st.penPlays, 'Počet faulů', ''],
        [st.penYds + ' yd', 'Celkem yardů', 'red'],
      ])}
    `);

  } else if (statsSection === 'hraci') {
    const teamName = st.teamName;
    const teamKey = statsTeam;
    const defKey = teamKey === 'A' ? 'B' : 'A';
    const defTeamName = state.teams[defKey].name;
    const allPlays = state.playLog;
    const teamPlays = allPlays.filter(p => p.teamName === teamName);
    const oppPlays  = allPlays.filter(p => p.teamName === defTeamName);

    // ── Build QB stats ──
    const qbStats = {};
    teamPlays.forEach(p => {
      if (!['pass','pass_td'].includes(p.badge)) return;
      const qb = p.qb || p.desc.match(/^(.+?) →/)?.[1] || p.desc.match(/^(.+?) INT/)?.[1];
      if (!qb) return;
      if (!qbStats[qb]) qbStats[qb] = {att:0, comp:0, yds:0, int:0, td:0, sack:0};
      qbStats[qb].att++;
      const isChyceno = p.desc.includes('+') && p.desc.includes('→');
      if (isChyceno) {
        qbStats[qb].comp++;
        const ydM = p.desc.match(/\+(\d+) yd/);
        if (ydM) qbStats[qb].yds += parseInt(ydM[1]);
      }
      if (p.isTD) qbStats[qb].td++;
      if (p.desc.includes('INT')) qbStats[qb].int++;
    });
    // Sacks suffered
    teamPlays.forEach(p => {
      if (p.badge !== 'sack') return;
      const m = p.desc.match(/^(.+?) sack/);
      if (!m) return;
      if (!qbStats[m[1]]) qbStats[m[1]] = {att:0,comp:0,yds:0,int:0,td:0,sack:0};
      qbStats[m[1]].sack++;
    });

    // ── Build WR stats ──
    const wrStats = {};
    teamPlays.forEach(p => {
      if (!['pass','pass_td'].includes(p.badge)) return;
      const isChyceno = p.desc.includes('+') && p.desc.includes('→');
      const isNekompletni = p.desc.includes('nekompletní');
      const wr = p.wr || p.desc.match(/→ (.+?)(?:\s+\+|\s+nekompletní)/)?.[1];
      if (!wr) return;
      if (!wrStats[wr]) wrStats[wr] = {targets:0, rec:0, yds:0, td:0, xp:0, xpPts:0};
      wrStats[wr].targets++;
      if (isChyceno) {
        wrStats[wr].rec++;
        const ydM = p.desc.match(/\+(\d+) yd/);
        if (ydM) wrStats[wr].yds += parseInt(ydM[1]);
      }
      if (p.isTD) wrStats[wr].td++;
    });
    // Run TDs — runner gets TD credit
    teamPlays.forEach(p => {
      if (p.badge !== 'run_td') return;
      const runner = p.runner || p.desc.match(/^(.+?) run/)?.[1];
      if (!runner) return;
      if (!wrStats[runner]) wrStats[runner] = {targets:0, rec:0, yds:0, td:0, xp:0, xpPts:0};
      wrStats[runner].td++;
      wrStats[runner].rec++;
      const ydM = p.desc.match(/([+-]?\d+) yd/);
      if (ydM) wrStats[runner].yds += parseInt(ydM[1]);
    });
    // Rush plays (non-TD)
    teamPlays.forEach(p => {
      if (p.badge !== 'run') return;
      const runner = p.runner || p.desc.match(/^(.+?) run/)?.[1];
      if (!runner) return;
      if (!wrStats[runner]) wrStats[runner] = {targets:0, rec:0, yds:0, td:0, xp:0, xpPts:0};
      wrStats[runner].rec++;
      const ydM = p.desc.match(/([+-]?\d+) yd/);
      if (ydM) wrStats[runner].yds += parseInt(ydM[1]);
    });
    // XP potvrzení
    allPlays.filter(p=>['xp1','xp2'].includes(p.badge) && p.teamName===teamName).forEach(p => {
      const m = p.desc.match(/→ (.+?)(?:\s·|\s✓|\s✗|$)/);
      if (m) {
        const wr = m[1].trim();
        if (!wrStats[wr]) wrStats[wr] = {targets:0, rec:0, yds:0, td:0, xp:0, xpPts:0};
        wrStats[wr].xp++;
        wrStats[wr].xpPts += p.badge==='xp1' ? 1 : 2;
      }
    });

    // ── Build DB (DEF) stats — DBs from this team's defense ──
    const dbStats = {};
    // Flag pulls and strip — on opponent plays with defPlayer from this team
    oppPlays.forEach(p => {
      if (!['run','pass'].includes(p.badge)) return;
      const defM = p.desc.match(/· ([^·\[]+?)(?:\s*\[|$)/);
      if (!defM) return;
      const defender = defM[1].trim();
      // Check if this player belongs to our team
      const isOurPlayer = state.teams[teamKey].players.some(pl => pl.name === defender);
      if (!isOurPlayer) return;
      if (!dbStats[defender]) dbStats[defender] = {flagPull:0, sack:0, brkup:0, int:0};
      if (p.desc.includes('Flag Pull')) dbStats[defender].flagPull++;
      if (p.desc.includes('Sražený balón')) dbStats[defender].brkup++;
    });
    // Sacks by our defenders
    oppPlays.forEach(p => {
      if (p.badge !== 'sack') return;
      const m = p.desc.match(/· (.+?)(?:\s*\[|$)/);
      if (!m) return;
      const defender = m[1].trim();
      const isOurPlayer = state.teams[teamKey].players.some(pl => pl.name === defender);
      if (!isOurPlayer) return;
      if (!dbStats[defender]) dbStats[defender] = {flagPull:0, sack:0, brkup:0, int:0};
      dbStats[defender].sack++;
    });
    // INTs by our DBs
    oppPlays.forEach(p => {
      if (p.badge !== 'pass') return;
      if (!p.desc.includes('INT')) return;
      const m = p.desc.match(/zachytil (.+?)\s*\(/);
      if (!m) return;
      const defender = m[1].trim();
      const isOurPlayer = state.teams[teamKey].players.some(pl => pl.name === defender);
      if (!isOurPlayer) return;
      if (!dbStats[defender]) dbStats[defender] = {flagPull:0, sack:0, brkup:0, int:0};
      dbStats[defender].int++;
    });

    // ── Render ──
    if (Object.keys(qbStats).length) {
      html += statCard('QB', Object.entries(qbStats).map(([n,s]) => {
        const cmp = s.att > 0 ? Math.round(s.comp/s.att*100) : 0;
        return `<div class="stat-player-row">
          <div class="stat-player-name">${n}</div>
          <div class="stat-player-nums">
            <div class="stat-num"><div class="val">${s.comp}/${s.att}</div><div class="lbl">COMP</div></div>
            <div class="stat-num"><div class="val">${cmp}%</div><div class="lbl">CMP%</div></div>
            <div class="stat-num"><div class="val">${s.yds}</div><div class="lbl">YDS</div></div>
            <div class="stat-num"><div class="val">${s.td}</div><div class="lbl">TD</div></div>
            <div class="stat-num"><div class="val">${s.int}</div><div class="lbl">INT</div></div>
            <div class="stat-num"><div class="val">${s.sack}</div><div class="lbl">SACK</div></div>
          </div></div>`;
      }).join(''));
    }

    if (Object.keys(wrStats).length) {
      html += statCard('WR', Object.entries(wrStats).sort((a,b)=>b[1].yds-a[1].yds).map(([n,s]) => {
        const totalPts = s.td * 6 + s.xpPts;
        return `<div class="stat-player-row">
          <div class="stat-player-name">${n}</div>
          <div class="stat-player-nums">
            <div class="stat-num"><div class="val">${s.rec}/${s.targets}</div><div class="lbl">REC</div></div>
            <div class="stat-num"><div class="val">${s.yds}</div><div class="lbl">YDS</div></div>
            <div class="stat-num"><div class="val">${s.td}</div><div class="lbl">TD</div></div>
            <div class="stat-num"><div class="val">${s.xp}</div><div class="lbl">XP</div></div>
            <div class="stat-num"><div class="val">${totalPts}</div><div class="lbl">PTS</div></div>
          </div></div>`;
      }).join(''));
    }

    if (Object.keys(dbStats).length) {
      html += statCard('DB (Obrana)', Object.entries(dbStats).map(([n,s]) =>
        `<div class="stat-player-row">
          <div class="stat-player-name">${n}</div>
          <div class="stat-player-nums">
            <div class="stat-num"><div class="val">${s.flagPull}</div><div class="lbl">FLAG</div></div>
            <div class="stat-num"><div class="val">${s.sack}</div><div class="lbl">SACK</div></div>
            <div class="stat-num"><div class="val">${s.brkup}</div><div class="lbl">BRKUP</div></div>
            <div class="stat-num"><div class="val">${s.int}</div><div class="lbl">INT</div></div>
          </div></div>`
      ).join(''));
    }

    if (!Object.keys(qbStats).length && !Object.keys(wrStats).length && !Object.keys(dbStats).length)
      html += `<div class="stat-empty">Zatím žádné statistiky hráčů</div>`;

  } else if (statsSection === 'plays') {
    const teamPlays = state.playLog.filter(p => p.teamName === st.teamName);
    const passCount = teamPlays.filter(p=>['pass','pass_td'].includes(p.badge)).length;
    const runCount  = teamPlays.filter(p=>['run','run_td'].includes(p.badge)).length;
    const sackCount = teamPlays.filter(p=>p.badge==='sack').length;
    const total = passCount + runCount + sackCount;
    const pct = n => total > 0 ? Math.round(n/total*100) : 0;

    // ── Down distribution ──
    // Extract down from downStr e.g. "1. down · ..."
    const ydsFromDesc = (p) => {
      if (p.badge==='run') { const m=p.desc.match(/([+-]?\d+) yd/); return m?parseInt(m[1]):null; }
      if (p.badge==='pass') { const m=p.desc.match(/\+(\d+) yd/); return m?parseInt(m[1]):null; }
      if (p.badge==='sack') { const m=p.desc.match(/(-\d+) yd/); return m?parseInt(m[1]):null; }
      return null;
    };
    const downData = {1:{S:0,M:0,L:0,tot:0}, 2:{S:0,M:0,L:0,tot:0}, 3:{S:0,M:0,L:0,tot:0}, 4:{S:0,M:0,L:0,tot:0}};
    teamPlays.forEach(p => {
      if (!['run','run_td','pass','pass_td','sack'].includes(p.badge)) return;
      const dm = p.downStr.match(/^(\d)\./);
      if (!dm) return;
      const down = parseInt(dm[1]);
      if (down < 1 || down > 4) return;
      const yds = ydsFromDesc(p);
      if (yds === null) return;
      downData[down].tot++;
      if (yds <= 7) downData[down].S++;
      else if (yds <= 15) downData[down].M++;
      else downData[down].L++;
    });

    const downChart = [1,2,3,4].map(d => {
      const dd = downData[d];
      const t = dd.tot || 1;
      const sW = Math.round(dd.S/t*100);
      const mW = Math.round(dd.M/t*100);
      const lW = Math.round(dd.L/t*100);
      return `<div class="down-row">
        <div class="down-row-label">${d}. DOWN<br><small style="font-weight:500;color:var(--text3)">${dd.tot} hrají</small></div>
        <div class="down-bar-wrap">
          <div class="down-bar">
            <div class="down-seg short"  style="width:${sW}%" title="Short ${dd.S}"></div>
            <div class="down-seg middle" style="width:${mW}%" title="Middle ${dd.M}"></div>
            <div class="down-seg long"   style="width:${lW}%" title="Long ${dd.L}"></div>
          </div>
          <div class="down-bar-nums">
            <span class="dbn short">S ${dd.S}</span>
            <span class="dbn middle">M ${dd.M}</span>
            <span class="dbn long">L ${dd.L}</span>
          </div>
        </div>
      </div>`;
    }).join('');

    html += statCard('Down distribuce &nbsp;<span style="font-size:0.65rem;font-weight:500;color:var(--text3)">■ Short 0–7 ■ Middle 8–15 ■ Long 16+</span>', downChart);

    // ── Play type split ──
    html += statCard('Rozdělení plays', `
      <div class="play-bar-row"><div class="play-bar-label">Pass</div>
        <div class="play-bar-track"><div class="play-bar-fill" style="width:${pct(passCount)}%;background:var(--green)"></div></div>
        <div class="play-bar-pct">${pct(passCount)}%</div></div>
      <div class="play-bar-row"><div class="play-bar-label">Rush</div>
        <div class="play-bar-track"><div class="play-bar-fill" style="width:${pct(runCount)}%;background:var(--blue)"></div></div>
        <div class="play-bar-pct">${pct(runCount)}%</div></div>
      <div class="play-bar-row"><div class="play-bar-label">Sack</div>
        <div class="play-bar-track"><div class="play-bar-fill" style="width:${pct(sackCount)}%;background:var(--red)"></div></div>
        <div class="play-bar-pct">${pct(sackCount)}%</div></div>
    `);

    // ── Named plays (Team A only) ──
    if (statsTeam === 'A' && state.playbook.length > 0) {
      // Count by play name × down
      const playNameStats = {}; // name -> { total, byDown: {1,2,3,4} }
      teamPlays.forEach(p => {
        if (!['run','pass','sack'].includes(p.badge)) return;
        const nm = p.desc.match(/\[(.+?)\]/);
        if (!nm) return;
        const name = nm[1];
        if (!playNameStats[name]) playNameStats[name] = { total:0, byDown:{1:0,2:0,3:0,4:0} };
        playNameStats[name].total++;
        const dm = p.downStr.match(/^(\d)\./);
        if (dm) { const d = parseInt(dm[1]); if(d>=1&&d<=4) playNameStats[name].byDown[d]++; }
      });

      if (Object.keys(playNameStats).length) {
        const maxTotal = Math.max(...Object.values(playNameStats).map(s=>s.total));
        const rows = Object.entries(playNameStats)
          .sort((a,b)=>b[1].total-a[1].total)
          .map(([name,s]) => {
            const w = Math.round(s.total/maxTotal*100);
            return `<div class="play-name-row">
              <div class="pnr-top">
                <span class="pnr-name">${name}</span>
                <span class="pnr-total">${s.total}×</span>
              </div>
              <div class="play-bar-track" style="margin:4px 0 3px">
                <div class="play-bar-fill" style="width:${w}%;background:var(--blue)"></div>
              </div>
              <div class="pnr-downs">
                ${[1,2,3,4].map(d=>`<span class="pnr-d ${s.byDown[d]>0?'active':''}">${d}D: ${s.byDown[d]}</span>`).join('')}
              </div>
            </div>`;
          }).join('');
        html += statCard('Nejčastější hry', rows);
      }

      // ── XP plays ──
      const xp1plays = {}, xp2plays = {};
      state.playLog.forEach(p => {
        if (p.teamName !== st.teamName) return;
        if (!['run','pass','sack'].includes(p.badge)) return;
        const nm = p.desc.match(/\[(.+?)\]/);
        if (!nm) return;
        // Look for next entry that is xp1 or xp2
        // We tag plays by badge xp1/xp2 in playLog right after TD
        // Instead: check if this play is in awaitingExtraPoint context
        // Better: tag at confirm time — we store xpContext in the play entry
      });

      // XP plays: look for plays tagged with xpContext
      const xp1rows = state.playLog.filter(p=>p.xpPts===1 && p.teamName===st.teamName);
      const xp2rows = state.playLog.filter(p=>p.xpPts===2 && p.teamName===st.teamName);
      const xpCount = (arr) => {
        const cnt = {};
        arr.forEach(p=>{ const nm=p.desc.match(/\[(.+?)\]/); if(nm){cnt[nm[1]]=(cnt[nm[1]]||0)+1;} });
        return cnt;
      };
      const xp1cnt = xpCount(xp1rows);
      const xp2cnt = xpCount(xp2rows);
      if (Object.keys(xp1cnt).length || Object.keys(xp2cnt).length) {
        const xpRows = (cnt, label) => Object.entries(cnt).sort((a,b)=>b[1]-a[1])
          .map(([n,c])=>`<div class="stat-player-row"><div class="stat-player-name">${n}</div>
            <div class="stat-player-nums"><div class="stat-num"><div class="val">${c}×</div><div class="lbl">${label}</div></div></div></div>`).join('');
        html += statCard('Hry na potvrzení', `${xpRows(xp1cnt,'1PT')}${xpRows(xp2cnt,'2PT')}`);
      }
    }

    if (total === 0) html += `<div class="stat-empty">Zatím žádné plays</div>`;
  }

  if (statsSection === 'tymy') {
    html += renderStatsActions();
  }

  document.getElementById('stats-page-content').innerHTML = html;
  if (statsSection === 'tymy') loadSettingsFromStorage();
}

// ═══════════════ LOCALSTORAGE ═══════════════
const LS_PLAYERS  = 'ff_players_v1';     // legacy (jen pro migraci)
const LS_PLAYBOOK = 'ff_playbook_v1';    // legacy (jen pro migraci)
const LS_SETTINGS = 'ff_settings_v1';
const LS_PROFILES = 'ff_profiles_v1';    // nové: { profiles: { [name]: {players, playbook} }, active: 'name' }
const LS_OPPONENT = 'ff_opponent_v1';    // soupeř (název + hráči) — odděleně od profilu, mění se per zápas

// ── Profile helpers ──────────────────────────────────────────────────────
function getProfilesData() {
  try {
    const raw = JSON.parse(localStorage.getItem(LS_PROFILES));
    if (raw && raw.profiles && raw.active) return raw;
  } catch(e) {}
  return null;
}
function writeProfilesData(data) {
  localStorage.setItem(LS_PROFILES, JSON.stringify(data));
}
function snapshotActiveProfile() {
  return {
    name: state.teams.A.name,
    players: state.teams.A.players.slice(),
    playbook: state.playbook.slice()
  };
}
function applyProfileToState(profile) {
  state.teams.A.name    = profile.name || 'Tým';
  state.teams.A.players = (profile.players || []).slice();
  state.playbook        = (profile.playbook || []).slice();
}
function persistActiveProfile() {
  const data = getProfilesData();
  if (!data) return;
  data.profiles[data.active] = snapshotActiveProfile();
  writeProfilesData(data);
}
function persistOpponent() {
  localStorage.setItem(LS_OPPONENT, JSON.stringify({
    name: state.teams.B.name,
    players: state.teams.B.players
  }));
}

function switchProfile(name) {
  const data = getProfilesData();
  if (!data || !data.profiles[name]) return;
  // Save current first (zachytí všechny změny od posledního persistu)
  data.profiles[data.active] = snapshotActiveProfile();
  // Apply new
  applyProfileToState(data.profiles[name]);
  data.active = name;
  writeProfilesData(data);
  // Upda
  // Update UI elements
  document.getElementById('ptab-a').textContent = state.teams.A.name;
  const ti = document.getElementById('team-name-input');
  if (ti && playerTab === 'A') ti.value = state.teams.A.name;
  // Sync Sheets settings teamName na nový profil
  try {
    const s = JSON.parse(localStorage.getItem(LS_SETTINGS) || '{}');
    s.teamName = name;
    localStorage.setItem(LS_SETTINGS, JSON.stringify(s));
  } catch(e) {}
  renderPlayerList();
  renderProfileSelector();
  showToast('Tým: ' + name);
}

function createProfile() {
  const name = (prompt('Název nového týmu (např. Bobcats Muži):') || '').trim();
  if (!name) return;
  const data = getProfilesData() || { profiles: {}, active: name };
  if (data.profiles[name]) { alert('Tým "' + name + '" už existuje.'); return; }
  if (data.active && data.profiles[data.active]) {
    data.profiles[data.active] = snapshotActiveProfile();
  }
  data.profiles[name] = { name, players: [], playbook: [] };
  data.active = name;
  writeProfilesData(data);
  applyProfileToState(data.profiles[name]);
  document.getElementById('ptab-a').textContent = name;
  try {
    const s = JSON.parse(localStorage.getItem(LS_SETTINGS) || '{}');
    s.teamName = name;
    localStorage.setItem(LS_SETTINGS, JSON.stringify(s));
  } catch(e) {}
  renderPlayerList();
  renderProfileSelector();
  showToast('Vytvořen tým: ' + name);
}

function deleteProfile() {
  const data = getProfilesData();
  if (!data) return;
  const name = data.active;
  if (!confirm('Smazat profil "' + name + '"? Soupiska a playbook tohoto týmu se ztratí.')) return;
  delete data.profiles[name];
  const remaining = Object.keys(data.profiles);
  if (remaining.length === 0) {
    const def = { name: 'Tým', players: [], playbook: [] };
    data.profiles[def.name] = def;
    data.active = def.name;
  } else {
    data.active = remaining[0];
  }
  applyProfileToState(data.profiles[data.active]);
  writeProfilesData(data);
  document.getElementById('ptab-a').textContent = state.teams.A.name;
  renderPlayerList();
  renderProfileSelector();
  showToast('Smazáno');
}

function renderProfileSelector() {
  const sel = document.getElementById('profile-select');
  if (!sel) return;
  const data = getProfilesData();
  if (!data) { sel.innerHTML = ''; return; }
  sel.innerHTML = Object.keys(data.profiles)
    .sort((a, b) => a.localeCompare(b))
    .map(n => '<option value="' + n.replace(/"/g, '&quot;') + '"' + (n === data.active ? ' selected' : '') + '>' + n + '</option>')
    .join('');
}

// ── Save/Load wrappers (zachová legacy callsites) ────────────────────────
function savePlayersToStorage() {
  persistActiveProfile();
  persistOpponent();
  // Legacy keys pro zpětnou kompat
  localStorage.setItem(LS_PLAYERS, JSON.stringify({
    A: { name: state.teams.A.name, players: state.teams.A.players },
    B: { name: state.teams.B.name, players: state.teams.B.players }
  }));
  localStorage.setItem(LS_PLAYBOOK, JSON.stringify(state.playbook));
}

function loadPlayersFromStorage() {
  try {
    let data = getProfilesData();
    // Migrace z legacy struktury, pokud neexistuje žádný profil
    if (!data) {
      const legacyP  = JSON.parse(localStorage.getItem(LS_PLAYERS) || 'null');
      const legacyPB = JSON.parse(localStorage.getItem(LS_PLAYBOOK) || 'null');
      if (legacyP && legacyP.A) {
        const name = legacyP.A.name || 'Tým';
        data = {
          profiles: { [name]: { name, players: legacyP.A.players || [], playbook: legacyPB || [] } },
          active: name
        };
        writeProfilesData(data);
      } else {
        const def = { name: 'Tým', players: [], playbook: [] };
        data = { profiles: { [def.name]: def }, active: def.name };
        writeProfilesData(data);
      }
    }
    const active = data.profiles[data.active];
    if (active) applyProfileToState(active);
    // Soupeř
    let opp = null;
    try { opp = JSON.parse(localStorage.getItem(LS_OPPONENT)); } catch(e) {}
    if (!opp) {
      try {
        const legacyP = JSON.parse(localStorage.getItem(LS_PLAYERS));
        if (legacyP && legacyP.B) opp = { name: legacyP.B.name, players: legacyP.B.players };
      } catch(e) {}
    }
    if (opp) {
      state.teams.B.name    = opp.name || 'TÝM B';
      state.teams.B.players = opp.players || [];
    }
  } catch(e) {
    console.warn('loadPlayersFromStorage:', e);
  }
}

function loadSettingsFromStorage() {
  try {
    const s = JSON.parse(localStorage.getItem(LS_SETTINGS));
    if (s && s.scriptUrl) {
      const el = document.getElementById('script-url-input');
      if (el) el.value = s.scriptUrl;
    }
    if (s && s.teamName)  {
      const el = document.getElementById('team-name-sheets');
      if (el) el.value = s.teamName;
    }
  } catch(e) {}
}

function saveSettings() {
  const url  = document.getElementById('script-url-input').value.trim();
  const team = document.getElementById('team-name-sheets').value.trim();
  localStorage.setItem(LS_SETTINGS, JSON.stringify({ scriptUrl: url, teamName: team }));
  showToast('Nastavení uloženo ✓');
}

let currentHalf = 1;

function startSecondHalf() {
  if (!confirm('Přepnout na 2. poločas?\n\n• Aktuální drive skončí (pokud nebyl TD = neúspěšný)\n• Balon: 5 yd\n• Soupeř na příjmu\n• Timeouty resetovány')) return;

  if (state.awaitingExtraPoint) {
    alert('Nelze přepnout — čeká se na potvrzení Extra Point. Nejdřív ho dokončete.');
    return;
  }

  currentHalf = 2;

  // 1) Zavři aktuální drive jako 'halftime' (jen pokud měl alespoň 1 play; TD už jsou v historii)
  if (state.currentDrive && state.currentDrive.plays > 0) {
    state.drives.push({
      team:        state.currentDrive.team || state.possession,
      result:      'halftime',
      plays:       state.currentDrive.plays,
      startBall:   state.currentDrive.startBall ?? state.ball,
      endBall:     state.ball,
      xpScored:    0,
      xpAttempted: 0
    });
  }

  // 2) Flip possession — soupeř na příjmu v 2. poločase
  const newPoss = state.possession === 'A' ? 'B' : 'A';
  state.possession   = newPoss;
  state.ball         = 5;
  state.down         = 1;
  state.firstDownAt  = 25;
  state.currentDrive = { team: newPoss, plays: 0, startBall: 5 };

  // 3) Reset timeouty
  state.teams.A.timeouts = [true, true];
  state.teams.B.timeouts = [true, true];

  // 4) UI sync (mirror flipPossession)
  const setCls = (id, cls) => { const el = document.getElementById(id); if (el) el.className = cls; };
  const setDisp = (id, v)  => { const el = document.getElementById(id); if (el) el.style.display = v; };
  const setText = (id, t)  => { const el = document.getElementById(id); if (el) el.textContent = t; };
  setCls('tbtn-a',       'team-btn'       + (newPoss==='A'?' active':''));
  setCls('tbtn-b',       'team-btn'       + (newPoss==='B'?' active':''));
  setDisp('ball-ind-a',  newPoss==='A' ? 'inline' : 'none');
  setDisp('ball-ind-b',  newPoss==='B' ? 'inline' : 'none');
  setCls('score-team-a', 'team-score clickable' + (newPoss==='A'?' active':''));
  setCls('score-team-b', 'team-score clickable' + (newPoss==='B'?' active':''));
  setText('offense-label', state.teams[newPoss].name + ' · NA ÚTOKU');
  updateTimeoutDots();
  updateFieldDisplay();
  resetPlay();

  showToast('2. poločas — ' + state.teams[newPoss].name + ' na příjmu');
  closeStats();
}

// ═══════════════ GOOGLE SHEETS ═══════════════
function getScriptUrl() {
  try {
    const s = JSON.parse(localStorage.getItem(LS_SETTINGS));
    return s && s.scriptUrl ? s.scriptUrl : null;
  } catch(e) { return null; }
}
function getSheetsTeamName() {
  try {
    const s = JSON.parse(localStorage.getItem(LS_SETTINGS));
    return (s && s.teamName) ? s.teamName : state.teams.A.name;
  } catch(e) { return state.teams.A.name; }
}

function buildMatchPayload() {
  const teamName = getSheetsTeamName();
  const plays = state.playLog;

  // Yardy
  let passYds = 0, rushYds = 0;
  plays.forEach(p => {
    if (['pass','pass_td'].includes(p.badge)) { const m = p.desc && p.desc.match(/\+(\d+) yd/); if(m) passYds += parseInt(m[1]); }
    if (['run','run_td'].includes(p.badge))   { const m = p.desc && p.desc.match(/([+-]?\d+) yd/); if(m) rushYds += parseInt(m[1]); }
  });

  // Drives — agregace + breakdown
  const offDrives = state.drives.filter(d => d.team === 'A');
  const defDrives = state.drives.filter(d => d.team !== 'A');
  const offTD    = offDrives.filter(d => d.result === 'td').length;
  const defStops = defDrives.filter(d => d.result !== 'td').length;
  const xp1att   = offDrives.filter(d => d.xpAttempted === 1).length;
  const xp1ok    = offDrives.filter(d => d.xpAttempted === 1 && d.xpScored === 1).length;
  const xp2att   = offDrives.filter(d => d.xpAttempted === 2).length;
  const xp2ok    = offDrives.filter(d => d.xpAttempted === 2 && d.xpScored === 2).length;

  // Fauly — agregát + per-faul breakdown
  const pens = plays.filter(p => p.badge === 'penalty');
  let penYds = 0;
  pens.forEach(p => {
    if (p.pen && typeof p.pen.yards === 'number') {
      penYds += Math.abs(p.pen.yards);
    } else {
      const m = p.desc && p.desc.match(/([+-]?\d+) yd/);
      if (m) penYds += Math.abs(parseInt(m[1]));
    }
  });
  const penalties = pens
    .filter(p => p.pen)
    .map(p => ({
      side:    p.pen.side,
      faulCz:  p.pen.faulCz,
      faulId:  p.pen.faulId,
      player:  p.pen.player,
      yards:   p.pen.yards,
      lod:     !!p.pen.lod,
      afd:     !!p.pen.afd,
      deadBall: !!p.pen.deadBall,
    }));

  // Drives breakdown pro list "[Tým] - Drives"
  const drivesPayload = (state.drives || []).map((dr, i) => ({
    idx:       i + 1,
    team:      dr.team,
    result:    dr.result || '',
    plays:     dr.plays || 0,
    startBall: typeof dr.startBall === 'number' ? dr.startBall : null,
    endBall:   typeof dr.endBall   === 'number' ? dr.endBall   : null,
    xpScored:  dr.xpScored  || 0,
    xpAttempted: dr.xpAttempted || 0,
  }));

  // QB stats
  const qbMap = {};
  plays.forEach(p => {
    if (!['pass','pass_td'].includes(p.badge)) return;
    const qb = p.qb || (p.desc && p.desc.match(/^(.+?) →/)?.[1]);
    if (!qb) return;
    if (!qbMap[qb]) qbMap[qb] = {att:0,comp:0,yds:0,td:0,int:0,sack:0};
    qbMap[qb].att++;
    if (p.desc && p.desc.includes('+') && p.desc.includes('→')) {
      qbMap[qb].comp++;
      const m = p.desc.match(/\+(\d+) yd/); if(m) qbMap[qb].yds += parseInt(m[1]);
    }
    if (p.isTD) qbMap[qb].td++;
    if (p.desc && p.desc.includes('INT')) qbMap[qb].int++;
  });
  plays.forEach(p => {
    if (p.badge !== 'sack') return;
    const m = p.desc && p.desc.match(/^(.+?) sack/);
    if (!m) return;
    if (!qbMap[m[1]]) qbMap[m[1]] = {att:0,comp:0,yds:0,td:0,int:0,sack:0};
    qbMap[m[1]].sack++;
  });

  // WR stats
  const wrMap = {};
  plays.forEach(p => {
    if (!['pass','pass_td'].includes(p.badge)) return;
    const wr = p.wr || (p.desc && p.desc.match(/→ (.+?)(?:\s+\+|\s+nekompletní)/)?.[1]);
    if (!wr) return;
    if (!wrMap[wr]) wrMap[wr] = {targets:0,rec:0,yds:0,td:0,xp:0,pts:0};
    wrMap[wr].targets++;
    if (p.desc && p.desc.includes('+') && !p.desc.includes('nekompletní')) {
      wrMap[wr].rec++;
      const m = p.desc.match(/\+(\d+) yd/); if(m) wrMap[wr].yds += parseInt(m[1]);
    }
    if (p.isTD) { wrMap[wr].td++; wrMap[wr].pts += 6; }
  });
  plays.forEach(p => {
    if (!['xp1','xp2'].includes(p.badge)) return;
    const m = p.desc && p.desc.match(/→ (.+?)(?:\s·|\s✓|\s✗|$)/);
    if (!m) return;
    const wr = m[1].trim();
    if (!wrMap[wr]) wrMap[wr] = {targets:0,rec:0,yds:0,td:0,xp:0,pts:0};
    wrMap[wr].xp++;
    wrMap[wr].pts += p.badge === 'xp1' ? 1 : 2;
  });

  // DB stats
  const dbMap = {};
  const teamANames = state.teams.A.players.map(p => p.name);
  plays.forEach(p => {
    if (!['run','run_td','pass','pass_td'].includes(p.badge)) return;
    const defM = p.desc && p.desc.match(/· ([^·\[\n]+?)(?:\s*\[|$)/);
    if (!defM) return;
    const def = defM[1].trim();
    if (!teamANames.includes(def)) return;
    if (!dbMap[def]) dbMap[def] = {flagPull:0,sack:0,brkup:0,int:0};
    if (p.desc.includes('Flag Pull')) dbMap[def].flagPull++;
    if (p.desc.includes('Sražený balón')) dbMap[def].brkup++;
  });
  plays.forEach(p => {
    if (p.badge !== 'sack') return;
    const m = p.desc && p.desc.match(/· (.+?)(?:\s*\[|$)/);
    if (!m) return;
    const def = m[1].trim();
    if (!teamANames.includes(def)) return;
    if (!dbMap[def]) dbMap[def] = {flagPull:0,sack:0,brkup:0,int:0};
    dbMap[def].sack++;
  });
  plays.forEach(p => {
    if (!p.desc || !p.desc.includes('INT')) return;
    const m = p.desc.match(/zachytil (.+?)\s*\(/);
    if (!m) return;
    const def = m[1].trim();
    if (!teamANames.includes(def)) return;
    if (!dbMap[def]) dbMap[def] = {flagPull:0,sack:0,brkup:0,int:0};
    dbMap[def].int++;
  });

  return {
    team:     teamName,
    opponent: state.teams.B.name,
    date:     new Date().toLocaleDateString('cs-CZ'),
    ourScore: state.teams.A.score,
    oppScore: state.teams.B.score,
    passYds, rushYds,
    offDrives: offDrives.length, offTD,
    defDrives: defDrives.length, defStops,
    xp1att, xp1ok, xp2att, xp2ok,
    penCount: pens.length, penYds,
    qbMap, wrMap, dbMap,
    teamAPlayers: teamANames,
    penalties,                      // breakdown pro list "[Tým] - Fauly"
    drives: drivesPayload,          // breakdown pro list "[Tým] - Drives"
    roster: state.teams.A.players.map(p => ({   // pro list "[Tým] - Roster"
      name: p.name || '',
      pos:  p.pos  || '',
      jersey: p.jersey || p.number || '',
      photoUrl: p.photoUrl || ''
    })),
    // ── Per-play data pro list "[Tým] - Plays" (Phase 2) ──
    plays: (state.playLog || []).map((p, idx) => {
      const wasOurOffense = p.teamName === state.teams.A.name;
      return {
        idx,
        teamName: p.teamName || '',
        side:     wasOurOffense ? 'OFF' : 'DEF',
        badge:    p.badge || '',
        down:     p.snap ? p.snap.down : null,
        ball:     p.snap ? p.snap.ball : null,
        yds:      typeof p.yds === 'number' ? p.yds : null,
        playName: p.playName || '',
        isTD:     !!p.isTD,
        isInt:    !!p.isInt,
        desc:     p.desc || ''
      };
    }),
  };
}

function saveMatchToSheets(onDone, prebuiltPayload) {
  const url = getScriptUrl();
  if (!url) {
    showToast('Nastav Apps Script URL v nastavení', 'red');
    if (onDone) onDone();
    return;
  }

  // Pokud volající (newMatch) sestavil payload před resetem, použij ho.
  const payload = prebuiltPayload || buildMatchPayload();
  const body = JSON.stringify(payload);

  // POST místo JSONP — JSONP měl ~12 KB limit URL parametrů.
  // Content-Type 'text/plain' = "simple request" → bez CORS preflightu.
  fetch(url, {
    method: 'POST',
    redirect: 'follow',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body
  })
    .then(res => res.text())
    .then(txt => {
      let resp = null;
      try { resp = JSON.parse(txt); } catch(_) {}
      if (resp && resp.status === 'ok') {
        showToast('Zápas uložen do Sheets ✓');
      } else if (resp && resp.status === 'error') {
        console.error('Sheets server error:', resp.message);
        showToast('Chyba Sheets: ' + resp.message, 'red');
      } else {
        showToast('Odesláno do Sheets (zkontroluj listy)');
      }
      if (onDone) onDone();
    })
    .catch(err => {
      // Fallback no-cors fire-and-forget
      console.warn('Sheets fetch fail, trying no-cors:', err);
      fetch(url, { method: 'POST', mode: 'no-cors',
                   headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body })
        .then(() => {
          showToast('Odesláno do Sheets (zkontroluj listy)');
          if (onDone) onDone();
        })
        .catch(err2 => {
          console.error('Sheets chyba:', err2);
          showToast('Chyba Sheets: ' + err2.message, 'red');
          if (onDone) onDone();
        });
    });
}

// ═══════════════ TOAST ═══════════════
function showToast(msg, color) {
  let t = document.getElementById('toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'toast';
    t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);' +
      'padding:10px 20px;border-radius:20px;font-size:0.85rem;font-weight:600;' +
      'color:#fff;z-index:999;transition:opacity 0.3s;pointer-events:none;';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.background = color === 'red' ? '#ff3b30' : '#1c1c1e';
  t.style.opacity = '1';
  clearTimeout(t._to);
  t._to = setTimeout(() => t.style.opacity = '0', 2500);
}
